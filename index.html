<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1LXH1 - 个人主页</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
  <!-- 粒子背景 -->
  <div id="particles-js"></div>
  
  <!-- 主要内容 -->
  <div class="container">
    <header class="header">
      <h1 class="title">1LXH1</h1>
      <p class="subtitle">欢迎来到我的个人主页</p>
    </header>

    <section class="about">
      <p>这是一个拥有动态星星粒子特效背景的个人主页</p>
      <p>🌟 鼠标移动可与粒子互动</p>
    </section>

    <footer class="footer">
      <p>© 2026 1LXH1. All rights reserved.</p>
    </footer>
  </div>

  <script>
    particlesJS('particles-js', {
      "particles": {
        "number": {
          "value": 80,
          "density": { "enable": true, "value_area": 1000 }
        },
        "color": { "value": "#ffffff" },
        "shape": { "type": "star", "stroke": { "width": 0, "color": "#000000" } },
        "opacity": {
          "value": 0.5,
          "random": true,
          "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false }
        },
        "size": {
          "value": 3,
          "random": true,
          "anim": { "enable": false, "speed": 40, "size_min": 0.1, "sync": false }
        },
        "line_linked": {
          "enable": true,
          "distance": 150,
          "color": "#ffffff",
          "opacity": 0.4,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 2,
          "direction": "none",
          "random": false,
          "straight": false,
          "out_mode": "out",
          "bounce": false,
          "attract": { "enable": false, "rotateX": 600, "rotateY": 1200 }
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": { "enable": true, "mode": "repulse" },
          "onclick": { "enable": true, "mode": "push" },
          "resize": true
        },
        "modes": {
          "repulse": { "distance": 100, "duration": 0.4 },
          "push": { "particles_nb": 4 }
        }
      },
      "retina_detect": true
    });
  </script>
</body>
</html>
